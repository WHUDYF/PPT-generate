        <text x="0" y="56" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A3A5C">读图结论</text>
        <text x="0" y="80" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">2014-2023 年博物馆数量增长 +86.8%，供给侧保持长期扩张；</text>
        <text x="0" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">2019 年旅游消费达到高点 57251 亿元，2020 年降至 22286.3 亿元；2023 年需求侧明显修复至 49133.1 亿元。</text>

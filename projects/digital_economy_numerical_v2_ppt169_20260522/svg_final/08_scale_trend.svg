<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <filter id="dotShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
            <feOffset dx="0" dy="1" result="offsetBlur" />
            <feFlood flood-color="#0F172A" flood-opacity="0.15" result="shadowColor" />
            <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
            <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <linearGradient id="museumArea" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1A3A5C" stop-opacity="0.12" />
            <stop offset="100%" stop-color="#1A3A5C" stop-opacity="0.02" />
        </linearGradient>
        <linearGradient id="spendArea" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C8963E" stop-opacity="0.10" />
            <stop offset="100%" stop-color="#C8963E" stop-opacity="0.02" />
        </linearGradient>
    </defs>
    
    <rect width="1280" height="720" fill="#FAFAFA" />
    
    <g id="page-header">
        <rect x="60" y="30" width="4" height="36" fill="#1A3A5C" />
        <text x="80" y="55" font-family="Georgia, KaiTi, serif" font-size="30" font-weight="bold" fill="#1A3A5C">规模趋势：文化供给持续增长，旅游消费冲击后修复</text>
        <text x="80" y="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">博物馆数量呈单调上升；旅游总花费在 2019 年高点后骤降，2023 年恢复至接近高位。</text>
    </g>
    

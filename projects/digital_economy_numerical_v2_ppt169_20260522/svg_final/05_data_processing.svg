        <text x="60" y="525" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">年度采样间隔 h = 1，因此三点差分可直接解释为"每年边际变化"；但政策与疫情冲击会放大端点误差。</text>

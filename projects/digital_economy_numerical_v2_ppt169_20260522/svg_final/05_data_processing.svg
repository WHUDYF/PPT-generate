        <text x="315" y="36" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">指数化</text>
        <text x="315" y="56" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2014=100；同尺度比较</text>
        

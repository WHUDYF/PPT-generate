    <g id="insights" transform="translate(60, 600)">
        <path fill="#F0F4F8" d="M6,0 H614 A6,6 0 0 1 620,6 V22 A6,6 0 0 1 614,28 H6 A6,6 0 0 1 0,22 V6 A6,6 0 0 1 6,0 Z" />
        <path fill="#1A3A5C" fill-opacity="0.7" d="M18,8 H26 A3,3 0 0 1 29,11 V19 A3,3 0 0 1 26,22 H18 A3,3 0 0 1 15,19 V11 A3,3 0 0 1 18,8 Z" />
        <text x="38" y="19" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A3A5C">博物馆年度增量</text>
        <line x1="175" y1="15" x2="205" y2="15" stroke="#2E6B8F" stroke-width="3" />
        <circle cx="190" cy="15" r="4" fill="#2E6B8F" />
        <text x="215" y="19" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E6B8F">游客年度变化</text>
        <text x="360" y="19" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" fill="#6B7280">供给侧持续扩张，需求侧受外生冲击后快速修复</text>
    </g>
    
    <g id="page-footer">
        <text x="60" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 团队三点差分计算；单位见原始数据表</text>
        <text x="1220" y="695" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#9CA3AF">09 / 12</text>
    </g>
</svg>
        <path fill="#1A3A5C" fill-opacity="0.7" d="M646,410 H670 A3,3 0 0 1 673,413 V557 A3,3 0 0 1 670,560 H646 A3,3 0 0 1 643,557 V413 A3,3 0 0 1 646,410 Z" />
        <path fill="#1A3A5C" fill-opacity="0.7" d="M750,430 H774 A3,3 0 0 1 777,433 V557 A3,3 0 0 1 774,560 H750 A3,3 0 0 1 747,557 V433 A3,3 0 0 1 750,430 Z" />
        <path fill="#1A3A5C" fill-opacity="0.7" d="M854,390 H878 A3,3 0 0 1 881,393 V557 A3,3 0 0 1 878,560 H854 A3,3 0 0 1 851,557 V393 A3,3 0 0 1 854,390 Z" />
        <path fill="#1A3A5C" fill-opacity="0.7" d="M959,316 H983 A3,3 0 0 1 986,319 V557 A3,3 0 0 1 983,560 H959 A3,3 0 0 1 956,557 V319 A3,3 0 0 1 959,316 Z" />
        <path fill="#2E6B8F" fill-opacity="0.8" d="M1060,370 H1084 A3,3 0 0 1 1087,373 V557 A3,3 0 0 1 1084,560 H1060 A3,3 0 0 1 1057,557 V373 A3,3 0 0 1 1060,370 Z" />
        
        <polyline points="140,340 244,290 349,240 453,180 557,194 662,270 766,555 871,412 975,560 1080,198" fill="none" stroke="#2E6B8F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        
        <circle cx="140" cy="340" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="244" cy="290" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="349" cy="240" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="453" cy="180" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="557" cy="194" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="662" cy="270" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="766" cy="555" r="7" fill="#C62828" stroke="#FFFFFF" stroke-width="2.5" filter="url(#dotShadow)" />
        <circle cx="871" cy="412" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="975" cy="558" r="5" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)" />
        <circle cx="1080" cy="198" r="7" fill="#2E7D32" stroke="#FFFFFF" stroke-width="2.5" filter="url(#dotShadow)" />
        
        <path fill="#C62828" d="M750,564 H852 A4,4 0 0 1 856,568 V582 A4,4 0 0 1 852,586 H750 A4,4 0 0 1 746,582 V568 A4,4 0 0 1 750,564 Z" />
        <text x="801" y="579" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">-1380 百万人次/年</text>
        <path fill="#2E7D32" d="M1064,172 H1166 A4,4 0 0 1 1170,176 V190 A4,4 0 0 1 1166,194 H1064 A4,4 0 0 1 1060,190 V176 A4,4 0 0 1 1064,172 Z" />
        <text x="1115" y="187" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">+2361 百万人次/年</text>

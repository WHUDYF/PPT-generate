<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <filter id="dotShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
            <feOffset dx="0" dy="1" result="offsetBlur" />
            <feFlood flood-color="#0F172A" flood-opacity="0.15" result="shadowColor" />
            <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
            <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    
    <rect width="1280" height="720" fill="#FAFAFA" />
    
    <g id="page-header">
        <rect x="60" y="30" width="4" height="36" fill="#1A3A5C" />
        <text x="80" y="55" font-family="Georgia, KaiTi, serif" font-size="30" font-weight="bold" fill="#1A3A5C">变化率：2020 年冲击与 2023 年修复被差分清晰捕捉</text>
        <text x="80" y="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">博物馆增量相对稳定，游客变化率在 2020 年附近急剧转负，2023 年显著转正。</text>
    </g>
    
    <g id="chartArea">
        
        <rect x="766" y="145" width="105" height="415" fill="#C62828" fill-opacity="0.04" />
        <text x="818" y="162" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#C62828">2020 冲击</text>
        <line x1="766" y1="168" x2="766" y2="560" stroke="#C62828" stroke-width="1" stroke-dasharray="4,4" />
        
        <line x1="140" y1="560" x2="1080" y2="560" stroke="#D1D5DB" stroke-width="1.5" />
        <line x1="140" y1="465" x2="1080" y2="465" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4" />
        <line x1="140" y1="370" x2="1080" y2="370" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4" />
        <line x1="140" y1="275" x2="1080" y2="275" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4" />
        <line x1="140" y1="180" x2="1080" y2="180" stroke="#D1D5DB" stroke-width="1" />
        
        <line x1="140" y1="370" x2="1080" y2="370" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="6,4" />
        
        <text x="125" y="565" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A3A5C">0</text>
        <text x="125" y="465" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">200</text>
        <text x="125" y="370" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">400</text>
        <text x="125" y="275" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">600</text>
        <text x="125" y="185" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A3A5C">800</text>
        <text x="30" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A3A5C" transform="rotate(-90, 30, 370)">博物馆年度增量（个）</text>
        
        <text x="1095" y="565" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E6B8F">-2000</text>
        <text x="1095" y="465" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">-1000</text>
        <text x="1095" y="370" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">0</text>
        <text x="1095" y="275" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">+1000</text>
        <text x="1095" y="185" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E6B8F">+2000</text>
        <text x="1245" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#2E6B8F" transform="rotate(90, 1245, 370)">游客年度变化（百万人次/年）</text>
        
        <line x1="140" y1="180" x2="140" y2="560" stroke="#94A3B8" stroke-width="2" />
        <line x1="140" y1="560" x2="1080" y2="560" stroke="#94A3B8" stroke-width="2" />
        <line x1="1080" y1="180" x2="1080" y2="560" stroke="#94A3B8" stroke-width="2" />
        
        <text x="140" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2014</text>
        <text x="348" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2016</text>
        <text x="557" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2018</text>
        <text x="766" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#C62828">2020</text>
        <text x="975" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2022</text>
        <text x="1080" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#2E6B8F">2023</text>
        
        
        <path fill="#1A3A5C" fill-opacity="0.7" d="M228,468 H252 A3,3 0 0 1 255,471 V557 A3,3 0 0 1 252,560 H228 A3,3 0 0 1 225,557 V471 A3,3 0 0 1 228,468 Z" />
        <path fill="#1A3A5C" fill-opacity="0.7" d="M332,462 H356 A3,3 0 0 1 359,465 V557 A3,3 0 0 1 356,560 H332 A3,3 0 0 1 329,557 V465 A3,3 0 0 1 332,462 Z" />

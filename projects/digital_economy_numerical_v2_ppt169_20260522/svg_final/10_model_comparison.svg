<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <filter id="pointShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
            <feOffset dx="0" dy="1" result="offsetBlur" />
            <feFlood flood-color="#0F172A" flood-opacity="0.15" result="shadowColor" />
            <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow" />
            <feMerge><feMergeNode in="shadow" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    
    <rect width="1280" height="720" fill="#FAFAFA" />
    
    <g id="page-header">
        <rect x="60" y="30" width="4" height="36" fill="#1A3A5C" />
        <text x="80" y="55" font-family="Georgia, KaiTi, serif" font-size="30" font-weight="bold" fill="#1A3A5C">模型比较：分段线性更适合冲击型社会数据</text>
        <text x="80" y="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">用 RMSE 和留一误差比较模型，说明分段低次最小二乘更稳。</text>
    </g>
    
    <g id="error-panel" transform="translate(60, 120)">
        <path fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#pointShadow)" d="M8,0 H382 A8,8 0 0 1 390,8 V272 A8,8 0 0 1 382,280 H8 A8,8 0 0 1 0,272 V8 A8,8 0 0 1 8,0 Z" />
        <path fill="#1A3A5C" d="M8,0 H382 A8,8 0 0 1 390,8 V32 A8,8 0 0 1 382,40 H8 A8,8 0 0 1 0,32 V8 A8,8 0 0 1 8,0 Z" />
        <rect x="0" y="20" width="390" height="20" fill="#1A3A5C" />
        <text x="195" y="26" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">模型误差比较（RMSE）</text>
        
        <text x="20" y="65" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6B7280">指标</text>
        <text x="210" y="65" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6B7280">分段线性</text>
        <text x="345" y="65" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#6B7280">全周期线性</text>
        <line x1="10" y1="78" x2="380" y2="78" stroke="#E2E8F0" stroke-width="1" />
        
        <text x="20" y="105" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">国内游客</text>
        <text x="210" y="105" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">432.8</text>
        <text x="345" y="105" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#C62828">1082.5</text>
        <line x1="10" y1="120" x2="380" y2="120" stroke="#F1F5F9" stroke-width="1" />
        
        <text x="20" y="148" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">旅游总花费</text>
        <text x="210" y="148" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">5118.5</text>
        <text x="345" y="148" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#C62828">11968.2</text>
        <line x1="10" y1="163" x2="380" y2="163" stroke="#F1F5F9" stroke-width="1" />
        
        <text x="20" y="190" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A1A2E">留一误差（游客）</text>
        <text x="210" y="190" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#C8963E">二次 1747.7</text>
        <text x="345" y="190" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#6B7280">线性 1340.5</text>
        
        <path fill="#F0F4F8" d="M21,220 H369 A6,6 0 0 1 375,226 V262 A6,6 0 0 1 369,268 H21 A6,6 0 0 1 15,262 V226 A6,6 0 0 1 21,220 Z" />
        <text x="30" y="240" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">二次模型样本内 RMSE 略低，但国内游客和旅游消费的留一误差更高，说明小样本下高阶拟合不稳。</text>
        <text x="30" y="258" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">因此采用分段低次最小二乘。</text>
    </g>
    
    <g id="scatter-panel" transform="translate(490, 120)">
        <path fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1" filter="url(#pointShadow)" d="M8,0 H722 A8,8 0 0 1 730,8 V272 A8,8 0 0 1 722,280 H8 A8,8 0 0 1 0,272 V8 A8,8 0 0 1 8,0 Z" />
        
        <line x1="80" y1="240" x2="700" y2="240" stroke="#E2E8F0" stroke-width="1" />
        <line x1="80" y1="190" x2="700" y2="190" stroke="#F1F5F9" stroke-width="0.5" />
        <line x1="80" y1="140" x2="700" y2="140" stroke="#F1F5F9" stroke-width="0.5" />
        <line x1="80" y1="90" x2="700" y2="90" stroke="#F1F5F9" stroke-width="0.5" />
        <line x1="80" y1="40" x2="700" y2="40" stroke="#E2E8F0" stroke-width="1" />
        
        <text x="65" y="245" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2000</text>
        <text x="65" y="45" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">6000</text>
        <text x="15" y="140" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6B7280" transform="rotate(-90, 15, 140)">国内游客（百万人次）</text>
        
        <text x="80" y="265" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">3500</text>
        <text x="390" y="265" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">5000</text>
        <text x="700" y="265" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">7000</text>
        <text x="390" y="275" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#6B7280">博物馆数量（个）</text>
        
        <line x1="80" y1="40" x2="80" y2="240" stroke="#94A3B8" stroke-width="1.5" />
        <line x1="80" y1="240" x2="700" y2="240" stroke="#94A3B8" stroke-width="1.5" />
        
        
        <circle cx="88" cy="215" r="6" fill="#1A3A5C" fill-opacity="0.8" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="137" cy="192" r="6" fill="#1A3A5C" fill-opacity="0.8" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="190" cy="170" r="6" fill="#1A3A5C" fill-opacity="0.8" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="283" cy="128" r="6" fill="#1A3A5C" fill-opacity="0.8" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="315" cy="92" r="6" fill="#1A3A5C" fill-opacity="0.8" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="348" cy="70" r="7" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#pointShadow)" />
        
        <circle cx="392" cy="184" r="6" fill="#C62828" fill-opacity="0.7" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="453" cy="170" r="6" fill="#C62828" fill-opacity="0.7" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="584" cy="205" r="6" fill="#C62828" fill-opacity="0.7" stroke="#FFFFFF" stroke-width="1.5" filter="url(#pointShadow)" />
        <circle cx="640" cy="128" r="7" fill="#2E6B8F" stroke="#FFFFFF" stroke-width="2" filter="url(#pointShadow)" />
        
        <line x1="80" y1="220" x2="354" y2="62" stroke="#1A3A5C" stroke-width="2" stroke-dasharray="6,3" />
        
        <path fill="#1A3A5C" fill-opacity="0.7" d="M563,50 H571 A3,3 0 0 1 574,53 V61 A3,3 0 0 1 571,64 H563 A3,3 0 0 1 560,61 V53 A3,3 0 0 1 563,50 Z" />
        <text x="580" y="62" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#1A1A2E">2014-2019（r=0.988）</text>
        <path fill="#C62828" fill-opacity="0.5" d="M563,72 H571 A3,3 0 0 1 574,75 V83 A3,3 0 0 1 571,86 H563 A3,3 0 0 1 560,83 V75 A3,3 0 0 1 563,72 Z" />
        <text x="580" y="84" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#1A1A2E">2020-2023（被冲击拉低）</text>
    </g>
    
    <g id="explanation" transform="translate(60, 425)">
        <path fill="#F0F4F8" d="M8,0 H1152 A8,8 0 0 1 1160,8 V52 A8,8 0 0 1 1152,60 H8 A8,8 0 0 1 0,52 V8 A8,8 0 0 1 8,0 Z" />
        
  <g transform="translate(25.0, 28.0) scale(0.078125)" fill="#C8963E">
    <path d="M208,104a79.86,79.86,0,0,1-30.59,62.92A24.29,24.29,0,0,0,168,186v6a8,8,0,0,1-8,8H96a8,8,0,0,1-8-8v-6a24.11,24.11,0,0,0-9.3-19A79.87,79.87,0,0,1,48,104.45C47.76,61.09,82.72,25,126.07,24A80,80,0,0,1,208,104Z" opacity="0.2" />
    <path d="M176,232a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,232Zm40-128a87.55,87.55,0,0,1-33.64,69.21A16.24,16.24,0,0,0,176,186v6a16,16,0,0,1-16,16H96a16,16,0,0,1-16-16v-6a16,16,0,0,0-6.23-12.66A87.59,87.59,0,0,1,40,104.49C39.74,56.83,78.26,17.14,125.88,16A88,88,0,0,1,216,104Zm-16,0a72,72,0,0,0-73.74-72c-39,.92-70.47,33.39-70.26,72.39a71.65,71.65,0,0,0,27.64,56.3A32,32,0,0,1,96,186v6h64v-6a32.15,32.15,0,0,1,12.47-25.35A71.65,71.65,0,0,0,200,104Zm-16.11-9.34a57.6,57.6,0,0,0-46.56-46.55,8,8,0,0,0-2.66,15.78c16.57,2.79,30.63,16.85,33.44,33.45A8,8,0,0,0,176,104a9,9,0,0,0,1.35-.11A8,8,0,0,0,183.89,94.66Z" />
  </g>
        <text x="55" y="25" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A3A5C">解释要点</text>
        <text x="180" y="25" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">课程对应：函数逼近 + 最小二乘残差平方和 + 分段低次思想</text>
        <text x="180" y="45" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">相关不等于因果，但平稳期高度同向说明公共文化供给与文旅需求有共同增长背景。</text>
    </g>
    
    <g id="page-footer">
        <text x="60" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 团队 Pearson 相关系数计算</text>
        <text x="1220" y="695" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#9CA3AF">10 / 12</text>
    </g>
</svg>
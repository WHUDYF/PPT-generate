    <!-- Footnote -->
    <g id="page-footer">
        <text x="60" y="610" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">注：旅游总花费单位为亿元，国内游客单位为百万人次；小数来自统计年鉴原始数值。</text>
        <text x="60" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 国家统计局国家数据、中国统计年鉴；团队整理</text>
        <text x="1220" y="695" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#9CA3AF">04 / 12</text>

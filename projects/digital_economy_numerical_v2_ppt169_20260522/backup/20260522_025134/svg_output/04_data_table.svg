<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="110%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="1" result="offsetBlur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.06" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>
    <!-- Background -->
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <!-- Header -->
    <g id="page-header">
        <rect x="60" y="30" width="4" height="36" fill="#1A3A5C"/>
        <text x="80" y="55" font-family="Georgia, KaiTi, serif" font-size="30" font-weight="bold" fill="#1A3A5C">原始数据表：三个指标形成可计算时间序列</text>
        <text x="80" y="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">2014-2023 年共 10 个年度点，既包含平稳增长阶段，也包含 2020 年后的外生冲击和恢复阶段。</text>
    </g>
    <!-- Main data table -->
    <g id="data-table" transform="translate(60, 110)">
        <rect x="0" y="0" width="1160" height="470" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" rx="6" filter="url(#cardShadow)"/>
        <!-- Header row -->
        <rect x="0" y="0" width="1160" height="44" rx="6" fill="#1A3A5C"/>
        <rect x="0" y="22" width="1160" height="22" fill="#1A3A5C"/>
        <text x="80" y="27" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">年份</text>
        <text x="320" y="27" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">博物馆数量（个）</text>
        <text x="600" y="27" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">国内游客（百万人次）</text>
        <text x="880" y="27" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">旅游总花费（亿元）</text>
        <text x="1080" y="27" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">阶段</text>
        <!-- Column dividers -->
        <line x1="160" y1="0" x2="160" y2="470" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="480" y1="0" x2="480" y2="470" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="740" y1="0" x2="740" y2="470" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="1020" y1="0" x2="1020" y2="470" stroke="#D1D5DB" stroke-width="1"/>
        <!-- Data rows -->
        <!-- Row 2014 -->
        <line x1="0" y1="44" x2="1160" y2="44" stroke="#E2E8F0" stroke-width="0.5"/>
        <text x="80" y="68" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A3A5C">2014</text>
        <text x="320" y="68" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">3,658</text>
        <text x="600" y="68" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">3,611</text>

        <text x="600" y="110" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">4,000</text>
        <text x="880" y="110" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="15" fill="#1A1A2E">34,195.1</text>
        <rect x="1035" y="97" width="60" height="22" rx="4" fill="#2E7D32" fill-opacity="0.12"/>
        <text x="1080" y="112" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#2E7D32">增长期</text>
        <!-- Row 2016 -->

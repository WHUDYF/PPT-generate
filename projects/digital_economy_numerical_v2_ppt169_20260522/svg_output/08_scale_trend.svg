<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
    <defs>
        <filter id="dotShadow" x="-15%" y="-15%" width="130%" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="0" dy="1" result="offsetBlur"/>
            <feFlood flood-color="#0F172A" flood-opacity="0.15" result="shadowColor"/>
            <feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
            <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="museumArea" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1A3A5C" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#1A3A5C" stop-opacity="0.02"/>
        </linearGradient>
        <linearGradient id="spendArea" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#C8963E" stop-opacity="0.10"/>
            <stop offset="100%" stop-color="#C8963E" stop-opacity="0.02"/>
        </linearGradient>
    </defs>
    <!-- Background -->
    <rect width="1280" height="720" fill="#FAFAFA"/>
    <!-- Header -->
    <g id="page-header">
        <rect x="60" y="30" width="4" height="36" fill="#1A3A5C"/>
        <text x="80" y="55" font-family="Georgia, KaiTi, serif" font-size="30" font-weight="bold" fill="#1A3A5C">规模趋势：文化供给持续增长，旅游消费冲击后修复</text>
        <text x="80" y="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">博物馆数量呈单调上升；旅游总花费在 2019 年高点后骤降，2023 年恢复至接近高位。</text>
    </g>
    <!-- Chart area -->
    <g id="chartArea">
        <!-- 2020 Shock band -->
        <rect x="766" y="145" width="105" height="415" fill="#C62828" fill-opacity="0.04"/>
        <text x="818" y="162" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#C62828">2020 冲击</text>
        <line x1="766" y1="168" x2="766" y2="560" stroke="#C62828" stroke-width="1" stroke-dasharray="4,4"/>
        <!-- Grid lines -->
        <line x1="140" y1="560" x2="1080" y2="560" stroke="#D1D5DB" stroke-width="1"/>
        <line x1="140" y1="465" x2="1080" y2="465" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="140" y1="370" x2="1080" y2="370" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="140" y1="275" x2="1080" y2="275" stroke="#E2E8F0" stroke-width="0.5" stroke-dasharray="4,4"/>
        <line x1="140" y1="180" x2="1080" y2="180" stroke="#D1D5DB" stroke-width="1"/>
        <!-- Left Y-axis labels (Museum count) -->
        <text x="125" y="565" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A3A5C">3000</text>
        <text x="125" y="470" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">4000</text>
        <text x="125" y="375" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">5000</text>
        <text x="125" y="280" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">6000</text>
        <text x="125" y="185" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A3A5C">7000</text>
        <text x="30" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A3A5C" transform="rotate(-90, 30, 370)">博物馆数量（个）</text>
        <!-- Right Y-axis labels (Tourism spending) -->
        <text x="1095" y="565" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#C8963E">0</text>
        <text x="1095" y="464" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">15000</text>
        <text x="1095" y="369" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">30000</text>
        <text x="1095" y="274" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">45000</text>
        <text x="1095" y="185" text-anchor="start" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#C8963E">60000</text>
        <text x="1245" y="370" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#C8963E" transform="rotate(90, 1245, 370)">旅游总花费（亿元）</text>
        <!-- Axes lines -->
        <line x1="140" y1="180" x2="140" y2="560" stroke="#94A3B8" stroke-width="2"/>
        <line x1="140" y1="560" x2="1080" y2="560" stroke="#94A3B8" stroke-width="2"/>
        <line x1="1080" y1="180" x2="1080" y2="560" stroke="#94A3B8" stroke-width="2"/>
        <!-- X-axis labels -->
        <text x="140" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2014</text>
        <text x="348" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2016</text>
        <text x="557" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2018</text>
        <text x="766" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#C62828">2020</text>
        <text x="975" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#6B7280">2022</text>
        <text x="1080" y="585" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#2E6B8F">2023</text>
        <!-- chart-plot-area: 140,180,1080,560 -->
        <!-- Museum count area fill -->
        <polygon points="140,504 244,488 349,466 453,415 557,398 662,380 766,354 871,326 975,259 1080,236 1080,560 140,560" fill="url(#museumArea)"/>
        <!-- Museum count line -->
        <polyline points="140,504 244,488 349,466 453,415 557,398 662,380 766,354 871,326 975,259 1080,236" fill="none" stroke="#1A3A5C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Museum data points -->
        <circle cx="140" cy="504" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="244" cy="488" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="349" cy="466" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="453" cy="415" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="557" cy="398" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="662" cy="380" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="766" cy="354" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="871" cy="326" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="975" cy="259" r="5" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <circle cx="1080" cy="236" r="7" fill="#1A3A5C" stroke="#FFFFFF" stroke-width="2.5" filter="url(#dotShadow)"/>
        <!-- Tourism spending area fill -->
        <polygon points="140,383 244,360 349,330 453,293 557,260 662,225 766,430 871,389 975,441 1080,273 1080,560 140,560" fill="url(#spendArea)"/>
        <!-- Tourism spending line -->
        <polyline points="140,383 244,360 349,330 453,293 557,260 662,225 766,430 871,389 975,441 1080,273" fill="none" stroke="#C8963E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8,4"/>
        <!-- Tourism spending data squares -->
        <rect x="135" y="378" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="239" y="355" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="344" y="325" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="448" y="288" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="552" y="255" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="657" y="220" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="761" y="425" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="866" y="384" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="970" y="436" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <rect x="1075" y="268" width="10" height="10" rx="2" fill="#C8963E" stroke="#FFFFFF" stroke-width="2" filter="url(#dotShadow)"/>
        <!-- Key annotation: 2019 peak -->
        <rect x="642" y="195" width="100" height="22" rx="4" fill="#C8963E"/>
        <text x="692" y="210" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">57251 亿</text>
        <!-- Key annotation: 2023 recovery -->
        <rect x="1060" y="245" width="100" height="22" rx="4" fill="#2E6B8F"/>
        <text x="1110" y="260" text-anchor="middle" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">6833 个</text>
    </g>
    <!-- Legend + Insights -->
    <g id="insights" transform="translate(60, 600)">
        <!-- Legend -->
        <rect x="0" y="0" width="500" height="32" rx="6" fill="#F0F4F8"/>
        <line x1="15" y1="16" x2="45" y2="16" stroke="#1A3A5C" stroke-width="3"/>
        <circle cx="30" cy="16" r="4" fill="#1A3A5C"/>
        <text x="55" y="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#1A3A5C">博物馆数量</text>
        <line x1="170" y1="16" x2="200" y2="16" stroke="#C8963E" stroke-width="2.5" stroke-dasharray="8,4"/>
        <rect x="178" y="11" width="8" height="8" rx="2" fill="#C8963E"/>
        <text x="210" y="20" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="13" font-weight="bold" fill="#C8963E">国内旅游总花费</text>
        <!-- Key insights -->
        <text x="0" y="56" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1A3A5C">读图结论</text>
        <text x="0" y="80" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">2014-2023 年博物馆数量增长 +86.8%，供给侧保持长期扩张；</text>
        <text x="0" y="100" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="14" fill="#1A1A2E">2019 年旅游消费达到高点 57251 亿元，2020 年降至 22286.3 亿元；2023 年需求侧明显修复至 49133.1 亿元。</text>
    </g>
    <!-- Footer -->
    <g id="page-footer">
        <text x="60" y="695" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="12" fill="#9CA3AF">Source: 国家统计局国家数据、中国统计年鉴；团队计算</text>
        <text x="1220" y="695" text-anchor="end" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="11" fill="#9CA3AF">08 / 12</text>
    </g>
</svg>
